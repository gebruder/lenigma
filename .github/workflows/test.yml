name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install .
      - name: Round-trip decoder tests
        run: python tests/test_roundtrip.py
      - name: CLI smoke tests
        run: |
          lenigma lookup 0281
          lenigma lookup 0001 -l
          lenigma lookup B8FF      # hex wildcard should resolve to B8xx
          lenigma lookup 281       # short form should zero-pad
          lenigma list > /dev/null
      - name: CODES.md is up to date with codes.json
        run: |
          python3 tools/gen_codes_md.py
          git diff --exit-code CODES.md
